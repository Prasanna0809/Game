<!DOCTYPE html>
<html>
<head>
  <title>My Games Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f2f2f2;
    }

    h1 {
      margin-top: 30px;
    }

    .games {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .game-card {
      background: white;
      padding: 25px;
      width: 220px;
      border-radius: 15px;
      box-shadow: 0 0 10px #aaa;
    }

    .game-card a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: royalblue;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h1>🎮 My Game Website</h1>
  <p>Choose a game to play!</p>

  <div class="games">
    <div class="game-card">
      <h2>Click Game</h2>
      <p>Click the button and increase your score.</p>
      <a href="click-game.html">Play</a>
    </div>

    <div class="game-card">
      <h2>Guess Game</h2>
      <p>Guess the correct number.</p>
      <a href="guess-game.html">Play</a>
    </div>

    <div class="game-card">
      <h2>Reaction Game</h2>
      <p>Test how fast you can react.</p>
      <a href="reaction-game.html">Play</a>
    </div>
  </div>

</body>
</html>
