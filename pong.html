<!DOCTYPE html>
<html>
<head>
  <title>Vertical Pong Pro</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #111827;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      width: 95%;
      max-width: 760px;
    }

    h1 {
      color: #2563eb;
      margin-top: 0;
      cursor: pointer;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .card {
      background: #eff6ff;
      padding: 15px 25px;
      border-radius: 15px;
      min-width: 130px;
    }

    .card h2 {
      margin: 0;
      color: #1d4ed8;
    }

    canvas {
      background: #020617;
      border-radius: 15px;
      width: 100%;
      max-width: 600px;
      cursor: pointer;
    }

    button, a {
      display: inline-block;
      margin: 10px 5px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover, a:hover {
      background: #1d4ed8;
    }

    select {
      padding: 10px;
      border-radius: 10px;
      font-size: 16px;
      margin: 10px;
    }

    .mobile-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    .mobile-controls button {
      font-size: 22px;
      padding: 14px 25px;
    }

    #message {
      font-weight: bold;
      min-height: 24px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 id="gameTitle">🏓 Vertical Pong Pro</h1>

  <p id="startText">
    <strong>Press Space or click the game to start.</strong>
  </p>

  <p>Computer is on top. You are at the bottom.</p>

  <p>
    <strong>
      Controls:
      Space = Start/Pause,
      R = Restart,
      Backspace = Home
    </strong>
  </p>

  <label for="difficulty">Difficulty:</label>

  <select id="difficulty" onchange="restartGame()">
    <option value="easy">Easy</option>
    <option value="medium" selected>Medium</option>
    <option value="hard">Hard</option>
  </select>

  <div class="stats">

    <div class="card">
      <h2 id="playerScore">0</h2>
      <p>Player</p>
    </div>

    <div class="card">
      <h2 id="computerScore">0</h2>
      <p>Computer</p>
    </div>

    <div class="card">
      <h2 id="bestScore">0</h2>
      <p>Best</p>
    </div>

    <div class="card">
      <h2 id="level">1</h2>
      <p>Level</p>
    </div>

  </div>

  <canvas id="game" width="600" height="400"></canvas>

  <div>
    <button onclick="restartGame()">Restart</button>
    <button onclick="togglePause()">Pause / Resume</button>
    <a href="index.html">⬅ Home</a>
  </div>

  <div class="mobile-controls">
    <button onclick="movePlayer(-70)">⬅</button>
    <button onclick="movePlayer(70)">➡</button>
  </div>

  <p id="message"></p>
</div>

<script src="sounds.js"></script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let paddleW = 100;
let paddleH = 12;

let playerX;
let computerX;

let ballX;
let ballY;
let ballDX;
let ballDY;
let ballRadius = 10;

let playerScore = 0;
let computerScore = 0;

let bestScore =
  Number(localStorage.getItem("verticalPongBestScore")) || 0;

let level = 1;
let levelGoal = 10;

let paused = false;
let gameStarted = false;
let animationId;

let computerSpeed = 0.08;

let leftPressed = false;
let rightPressed = false;
let paddleSpeed = 9;

document.getElementById("bestScore").innerText = bestScore;

function safeSound(type) {
  if (typeof playSound === "function") {
    playSound(type);
  }
}

document.addEventListener("keydown", function(e) {

  if (
    e.key === "ArrowLeft" ||
    e.key === "ArrowRight" ||
    e.key === " " ||
    e.key === "Backspace"
  ) {
    e.preventDefault();
  }

  // Home
  if (e.key === "Backspace") {
    window.location.href = "index.html";
  }

  // Restart
  if (e.key === "r" || e.key === "R") {
    restartGame();
  }

  // Space Start / Pause
  if (e.key === " ") {

    if (!gameStarted) {
      startGame();
    } else {
      togglePause();
    }
  }

  if (!gameStarted) return;

  if (e.key === "ArrowLeft") {
    leftPressed = true;
  }

  if (e.key === "ArrowRight") {
    rightPressed = true;
  }
});

document.addEventListener("keyup", function(e) {

  if (e.key === "ArrowLeft") {
    leftPressed = false;
  }

  if (e.key === "ArrowRight") {
    rightPressed = false;
  }
});

canvas.addEventListener("mousemove", function(e) {

  if (!gameStarted || paused) return;

  const rect = canvas.getBoundingClientRect();

  playerX = e.clientX - rect.left - paddleW / 2;

  keepPlayerInBounds();
});

// Click canvas = Start or Pause
canvas.addEventListener("click", function() {

  if (!gameStarted) {
    startGame();
  } else {
    togglePause();
  }
});

// Click title = Start
document.getElementById("gameTitle")
.addEventListener("click", function() {

  if (!gameStarted) {
    startGame();
  }
});

function showStartScreen() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawCourt();

  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "bold 42px Arial";
  ctx.textAlign = "center";

  ctx.fillText(
    "▶ START",
    canvas.width / 2,
    canvas.height / 2 - 10
  );

  ctx.font = "18px Arial";

  ctx.fillText(
    "Press Space or click the game",
    canvas.width / 2,
    canvas.height / 2 + 30
  );
}

function setDifficulty() {

  const difficulty =
    document.getElementById("difficulty").value;

  if (difficulty === "easy") {
    computerSpeed = 0.05;
  }
  else if (difficulty === "hard") {
    computerSpeed = 0.13;
  }
  else {
    computerSpeed = 0.08;
  }
}

function startGame() {

  setDifficulty();

  gameStarted = true;
  paused = false;

  playerX = canvas.width / 2 - paddleW / 2;
  computerX = canvas.width / 2 - paddleW / 2;

  ballX = canvas.width / 2;
  ballY = canvas.height / 2;

  ballDX = 3;
  ballDY = 4;

  playerScore = 0;
  computerScore = 0;

  level = 1;
  levelGoal = 10;

  document.getElementById("level").innerText = level;

  leftPressed = false;
  rightPressed = false;

  document.getElementById("startText").innerText =
    "Game started!";

  document.getElementById("message").innerText =
    "Reach 10 points for Level 2!";

  updateScore();

  cancelAnimationFrame(animationId);

  draw();

  safeSound("click");
}

function draw() {

  if (!gameStarted) return;

  if (paused) {

    drawPauseOverlay();

    animationId =
      requestAnimationFrame(draw);

    return;
  }

  movePlayerSmooth();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawCourt();
  drawPaddles();
  drawBall();

  moveBall();
  moveComputer();
  checkCollisions();

  updateScore();

  animationId =
    requestAnimationFrame(draw);
}

function movePlayerSmooth() {

  if (leftPressed) {
    playerX -= paddleSpeed;
  }

  if (rightPressed) {
    playerX += paddleSpeed;
  }

  keepPlayerInBounds();
}

function drawCourt() {

  ctx.strokeStyle = "#334155";

  ctx.setLineDash([10, 10]);

  ctx.beginPath();
  ctx.moveTo(0, canvas.height / 2);
  ctx.lineTo(canvas.width, canvas.height / 2);
  ctx.stroke();

  ctx.setLineDash([]);
}

function drawPaddles() {

  ctx.fillStyle = "#f97316";

  ctx.fillRect(
    computerX,
    20,
    paddleW,
    paddleH
  );

  ctx.fillStyle = "#38bdf8";

  ctx.fillRect(
    playerX,
    canvas.height - 32,
    paddleW,
    paddleH
  );
}

function drawBall() {

  ctx.fillStyle = "white";

  ctx.beginPath();

  ctx.arc(
    ballX,
    ballY,
    ballRadius,
    0,
    Math.PI * 2
  );

  ctx.fill();
}

function drawPauseOverlay() {

  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";

  ctx.font = "bold 34px Arial";

  ctx.textAlign = "center";

  ctx.fillText(
    "PAUSED",
    canvas.width / 2,
    canvas.height / 2
  );

  ctx.font = "18px Arial";

  ctx.fillText(
    "Press Space or click to resume",
    canvas.width / 2,
    canvas.height / 2 + 35
  );
}

function moveBall() {

  ballX += ballDX;
  ballY += ballDY;

  if (
    ballX < ballRadius ||
    ballX > canvas.width - ballRadius
  ) {
    ballDX *= -1;
  }
}

function moveComputer() {

  computerX +=
    (ballX - (computerX + paddleW / 2))
    * computerSpeed;

  if (computerX < 0) {
    computerX = 0;
  }

  if (computerX + paddleW > canvas.width) {
    computerX = canvas.width - paddleW;
  }
}

function checkCollisions() {

  // Top paddle
  if (
    ballY - ballRadius < 20 + paddleH &&
    ballX > computerX &&
    ballX < computerX + paddleW
  ) {

    ballDY = Math.abs(ballDY) + 0.15;

    ballDX +=
      (ballX - (computerX + paddleW / 2))
      * 0.04;

    safeSound("click");
  }

  // Bottom paddle
  if (
    ballY + ballRadius >
    canvas.height - 32 &&
    ballX > playerX &&
    ballX < playerX + paddleW
  ) {

    ballDY = -Math.abs(ballDY) - 0.15;

    ballDX +=
      (ballX - (playerX + paddleW / 2))
      * 0.04;

    safeSound("click");
  }

  // Player scores
  if (ballY < 0) {

    playerScore++;

    document.getElementById("message").innerText =
      "You scored! 🔥";

    safeSound("score");

    // LEVEL SYSTEM
    if (playerScore >= levelGoal) {

      level++;

      levelGoal = level * 10;

      computerSpeed += 0.02;

      document.getElementById("level").innerText =
        level;

      document.getElementById("message").innerText =
        "🚀 Level " +
        level +
        "! Reach " +
        levelGoal +
        " points!";

      safeSound("win");
    }

    // Best score
    if (playerScore > bestScore) {

      bestScore = playerScore;

      localStorage.setItem(
        "verticalPongBestScore",
        bestScore
      );

      document.getElementById("bestScore")
      .innerText = bestScore;

      safeSound("win");
    }

    resetBall(1);
  }

  // Computer scores
  if (ballY > canvas.height) {

    computerScore++;

    document.getElementById("message").innerText =
      "Computer scored!";

    safeSound("lose");

    resetBall(-1);
  }
}

function resetBall(direction) {

  ballX = canvas.width / 2;
  ballY = canvas.height / 2;

  ballDX =
    Math.random() > 0.5 ? 3 : -3;

  ballDY = 4 * direction;
}

function updateScore() {

  document.getElementById("playerScore")
  .innerText = playerScore;

  document.getElementById("computerScore")
  .innerText = computerScore;
}

function movePlayer(amount) {

  if (!gameStarted) {
    startGame();
    return;
  }

  playerX += amount;

  keepPlayerInBounds();

  safeSound("click");
}

function keepPlayerInBounds() {

  if (playerX < 0) {
    playerX = 0;
  }

  if (
    playerX + paddleW >
    canvas.width
  ) {
    playerX =
      canvas.width - paddleW;
  }
}

function restartGame() {
  startGame();
}

function togglePause() {

  if (!gameStarted) {
    startGame();
    return;
  }

  paused = !paused;

  safeSound("click");
}

showStartScreen();
</script>

</body>
</html>
