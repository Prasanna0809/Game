<!DOCTYPE html>
<html>
<head>
  <title>Vertical Pong Pro</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #111827;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      width: 95%;
      max-width: 760px;
    }

    h1 { color: #2563eb; margin-top: 0; }

    .stats {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .card {
      background: #eff6ff;
      padding: 15px 25px;
      border-radius: 15px;
      min-width: 130px;
    }

    .card h2 { margin: 0; color: #1d4ed8; }

    canvas {
      background: #020617;
      border-radius: 15px;
      width: 100%;
      max-width: 600px;
    }

    button, a {
      display: inline-block;
      margin: 10px 5px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover, a:hover { background: #1d4ed8; }

    select {
      padding: 10px;
      border-radius: 10px;
      font-size: 16px;
      margin: 10px;
    }

    .mobile-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    .mobile-controls button {
      font-size: 22px;
      padding: 14px 25px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🏓 Vertical Pong Pro</h1>
  <p>Computer is on top. You are at the bottom. Move left and right!</p>

  <label for="difficulty">Difficulty:</label>
  <select id="difficulty" onchange="restartGame()">
    <option value="easy">Easy</option>
    <option value="medium" selected>Medium</option>
    <option value="hard">Hard</option>
  </select>

  <div class="stats">
    <div class="card">
      <h2 id="playerScore">0</h2>
      <p>Player</p>
    </div>
    <div class="card">
      <h2 id="computerScore">0</h2>
      <p>Computer</p>
    </div>
    <div class="card">
      <h2 id="bestScore">0</h2>
      <p>Best Streak</p>
    </div>
  </div>

  <canvas id="game" width="600" height="400"></canvas>

  <div>
    <button onclick="restartGame()">Restart</button>
    <button onclick="togglePause()">Pause / Resume</button>
    <a href="index.html">⬅ Home</a>
  </div>

  <div class="mobile-controls">
    <button onclick="movePlayer(-45)">⬅</button>
    <button onclick="movePlayer(45)">➡</button>
  </div>

  <p id="message"></p>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let paddleW = 100;
let paddleH = 12;

let playerX;
let computerX;

let ballX;
let ballY;
let ballDX;
let ballDY;
let ballRadius = 10;

let playerScore;
let computerScore;
let winStreak = 0;
let bestScore = localStorage.getItem("verticalPongBestScore") || 0;

let paused = false;
let animationId;
let computerSpeed = 0.08;

document.getElementById("bestScore").innerText = bestScore;

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft") movePlayer(-35);
  if (e.key === "ArrowRight") movePlayer(35);
  if (e.key === " ") togglePause();
});

canvas.addEventListener("mousemove", function(e) {
  let rect = canvas.getBoundingClientRect();
  playerX = e.clientX - rect.left - paddleW / 2;
  keepPlayerInBounds();
});

function setDifficulty() {
  let difficulty = document.getElementById("difficulty").value;

  if (difficulty === "easy") computerSpeed = 0.05;
  else if (difficulty === "hard") computerSpeed = 0.13;
  else computerSpeed = 0.08;
}

function startGame() {
  setDifficulty();

  playerX = canvas.width / 2 - paddleW / 2;
  computerX = canvas.width / 2 - paddleW / 2;

  ballX = canvas.width / 2;
  ballY = canvas.height / 2;
  ballDX = 3;
  ballDY = 4;

  playerScore = 0;
  computerScore = 0;
  winStreak = 0;
  paused = false;

  updateScore();

  cancelAnimationFrame(animationId);
  draw();
}

function draw() {
  if (paused) {
    animationId = requestAnimationFrame(draw);
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawCourt();
  drawPaddles();
  drawBall();

  moveBall();
  moveComputer();
  checkCollisions();

  updateScore();

  animationId = requestAnimationFrame(draw);
}

function drawCourt() {
  ctx.strokeStyle = "#334155";
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(0, canvas.height / 2);
  ctx.lineTo(canvas.width, canvas.height / 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawPaddles() {
  ctx.fillStyle = "#f97316";
  ctx.fillRect(computerX, 20, paddleW, paddleH);

  ctx.fillStyle = "#38bdf8";
  ctx.fillRect(playerX, canvas.height - 32, paddleW, paddleH);
}

function drawBall() {
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
  ctx.fill();
}

function moveBall() {
  ballX += ballDX;
  ballY += ballDY;

  if (ballX < ballRadius || ballX > canvas.width - ballRadius) {
    ballDX *= -1;
  }
}

function moveComputer() {
  computerX += (ballX - (computerX + paddleW / 2)) * computerSpeed;

  if (computerX < 0) computerX = 0;
  if (computerX + paddleW > canvas.width) {
    computerX = canvas.width - paddleW;
  }
}

function checkCollisions() {
  if (
    ballY - ballRadius < 20 + paddleH &&
    ballX > computerX &&
    ballX < computerX + paddleW
  ) {
    ballDY = Math.abs(ballDY) + 0.15;
    ballDX += (ballX - (computerX + paddleW / 2)) * 0.04;
  }

  if (
    ballY + ballRadius > canvas.height - 32 &&
    ballX > playerX &&
    ballX < playerX + paddleW
  ) {
    ballDY = -Math.abs(ballDY) - 0.15;
    ballDX += (ballX - (playerX + paddleW / 2)) * 0.04;
  }

  if (ballY < 0) {
    playerScore++;
    winStreak++;
    document.getElementById("message").innerText = "You scored! 🔥";

    if (winStreak > bestScore) {
      bestScore = winStreak;
      localStorage.setItem("verticalPongBestScore", bestScore);
      document.getElementById("bestScore").innerText = bestScore;
    }

    resetBall(1);
  }

  if (ballY > canvas.height) {
    computerScore++;
    winStreak = 0;
    document.getElementById("message").innerText = "Computer scored!";
    resetBall(-1);
  }
}

function resetBall(direction) {
  ballX = canvas.width / 2;
  ballY = canvas.height / 2;
  ballDX = Math.random() > 0.5 ? 3 : -3;
  ballDY = 4 * direction;
}

function updateScore() {
  document.getElementById("playerScore").innerText = playerScore;
  document.getElementById("computerScore").innerText = computerScore;
}

function movePlayer(amount) {
  playerX += amount;
  keepPlayerInBounds();
}

function keepPlayerInBounds() {
  if (playerX < 0) playerX = 0;
  if (playerX + paddleW > canvas.width) {
    playerX = canvas.width - paddleW;
  }
}

function restartGame() {
  document.getElementById("message").innerText = "";
  startGame();
}

function togglePause() {
  paused = !paused;
}

startGame();
</script>

<script src="sounds.js"></script>
</body>
</html>
