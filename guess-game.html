<!DOCTYPE html>
<html>
<head>
  <title>Guess Master</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #facc15, #f97316);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      background: white;
      padding: 35px;
      border-radius: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      width: 90%;
      max-width: 560px;
    }

    h1 {
      margin-top: 0;
      color: #ea580c;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .card {
      background: #fff7ed;
      padding: 15px 20px;
      border-radius: 15px;
      min-width: 120px;
    }

    .card h2 {
      margin: 0;
      color: #ea580c;
    }

    select, input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 18px;
      margin: 8px;
      text-align: center;
    }

    input {
      width: 150px;
    }

    button, a {
      display: inline-block;
      margin: 8px 5px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ea580c;
      color: white;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover, a:hover {
      background: #c2410c;
    }

    #message {
      font-size: 20px;
      font-weight: bold;
      min-height: 30px;
      margin-top: 20px;
    }

    #hint {
      color: #6b7280;
      min-height: 24px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔢 Guess Master</h1>
  <p id="rangeText">Guess a number between 1 and 10</p>

  <label for="difficulty">Difficulty:</label>
  <select id="difficulty" onchange="startGame()">
    <option value="easy">Easy: 1 - 10</option>
    <option value="medium" selected>Medium: 1 - 50</option>
    <option value="hard">Hard: 1 - 100</option>
  </select>

  <div class="stats">
    <div class="card">
      <h2 id="attempts">0</h2>
      <p>Attempts</p>
    </div>
    <div class="card">
      <h2 id="best">--</h2>
      <p>Best</p>
    </div>
    <div class="card">
      <h2 id="maxNumber">50</h2>
      <p>Max Number</p>
    </div>
  </div>

  <input id="guess" type="number" placeholder="Enter guess">
  <br>

  <button onclick="checkGuess()">Guess</button>
  <button onclick="startGame()">Restart</button>
  <button onclick="resetBest()">Reset Best</button>
  <a href="index.html">⬅ Home</a>

  <p id="message"></p>
  <p id="hint"></p>
</div>

<script>
let secretNumber;
let attempts = 0;
let maxNumber = 50;
let gameOver = false;

const guessInput = document.getElementById("guess");

guessInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    checkGuess();
  }
});

function getMaxNumber() {
  const difficulty = document.getElementById("difficulty").value;

  if (difficulty === "easy") return 10;
  if (difficulty === "hard") return 100;
  return 50;
}

function startGame() {
  maxNumber = getMaxNumber();
  secretNumber = Math.floor(Math.random() * maxNumber) + 1;
  attempts = 0;
  gameOver = false;

  document.getElementById("attempts").innerText = attempts;
  document.getElementById("maxNumber").innerText = maxNumber;
  document.getElementById("rangeText").innerText =
    "Guess a number between 1 and " + maxNumber;

  document.getElementById("message").innerText = "";
  document.getElementById("hint").innerText = "New game started. Good luck!";
  guessInput.value = "";
  guessInput.disabled = false;

  updateBestDisplay();
}

function checkGuess() {
  if (gameOver) return;

  const guess = Number(guessInput.value);

  if (!guess || guess < 1 || guess > maxNumber) {
    document.getElementById("message").innerText =
      "⚠️ Enter a number between 1 and " + maxNumber;
    return;
  }

  attempts++;
  document.getElementById("attempts").innerText = attempts;

  if (guess === secretNumber) {
    gameOver = true;
    guessInput.disabled = true;

    document.getElementById("message").innerText =
      "🎉 Correct! You won in " + attempts + " attempts!";

    saveBestScore();
  } else if (guess < secretNumber) {
    document.getElementById("message").innerText = "📉 Too low! Try higher.";
    giveHint(guess);
  } else {
    document.getElementById("message").innerText = "📈 Too high! Try lower.";
    giveHint(guess);
  }

  guessInput.value = "";
  guessInput.focus();
}

function giveHint(guess) {
  const difference = Math.abs(secretNumber - guess);

  if (difference <= 3) {
    document.getElementById("hint").innerText = "🔥 Very close!";
  } else if (difference <= 10) {
    document.getElementById("hint").innerText = "🙂 Getting closer!";
  } else {
    document.getElementById("hint").innerText = "🧊 Far away.";
  }
}

function saveBestScore() {
  const difficulty = document.getElementById("difficulty").value;
  const key = "guessBest_" + difficulty;
  const best = Number(localStorage.getItem(key));

  if (!best || attempts < best) {
    localStorage.setItem(key, attempts);
    document.getElementById("hint").innerText = "🏆 New best score!";
  } else {
    document.getElementById("hint").innerText = "Nice win!";
  }

  updateBestDisplay();
}

function updateBestDisplay() {
  const difficulty = document.getElementById("difficulty").value;
  const key = "guessBest_" + difficulty;
  const best = localStorage.getItem(key);

  document.getElementById("best").innerText = best ? best : "--";
}

function resetBest() {
  const difficulty = document.getElementById("difficulty").value;
  localStorage.removeItem("guessBest_" + difficulty);
  updateBestDisplay();
  document.getElementById("hint").innerText = "Best score reset!";
}

startGame();
</script>

<script src="sounds.js"></script>
</body>
</html>
