<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <style>
    body { text-align: center; font-family: Arial; background: #f2f2f2; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 40px;
      background: white;
      border: 2px solid black;
      cursor: pointer;
    }
    button {
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>⭕ Tic Tac Toe ❌</h1>
<p id="status">Player X's turn</p>

<div class="board">
  <button class="cell" onclick="makeMove(0)"></button>
  <button class="cell" onclick="makeMove(1)"></button>
  <button class="cell" onclick="makeMove(2)"></button>
  <button class="cell" onclick="makeMove(3)"></button>
  <button class="cell" onclick="makeMove(4)"></button>
  <button class="cell" onclick="makeMove(5)"></button>
  <button class="cell" onclick="makeMove(6)"></button>
  <button class="cell" onclick="makeMove(7)"></button>
  <button class="cell" onclick="makeMove(8)"></button>
</div>

<button onclick="resetGame()">Restart</button>
<br><br>
<a href="index.html">⬅ Back to Home</a>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameOver = false;

function makeMove(index) {
  if (board[index] !== "" || gameOver) return;

  board[index] = currentPlayer;
  document.getElementsByClassName("cell")[index].innerText = currentPlayer;

  if (checkWinner()) {
    document.getElementById("status").innerText = "🎉 Player " + currentPlayer + " wins!";
    gameOver = true;
  } else if (!board.includes("")) {
    document.getElementById("status").innerText = "It's a tie!";
    gameOver = true;
  } else {
    currentPlayer = currentPlayer === "X" ? "O" : "X";
    document.getElementById("status").innerText = "Player " + currentPlayer + "'s turn";
  }
}

function checkWinner() {
  let wins = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  return wins.some(combo => {
    return combo.every(index => board[index] === currentPlayer);
  });
}

function resetGame() {
  board = ["", "", "", "", "", "", "", "", ""];
  currentPlayer = "X";
  gameOver = false;
  document.getElementById("status").innerText = "Player X's turn";

  let cells = document.getElementsByClassName("cell");
  for (let i = 0; i < cells.length; i++) {
    cells[i].innerText = "";
  }
}
</script>

</body>
</html>
