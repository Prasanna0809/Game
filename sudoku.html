<!DOCTYPE html>
<html>
<head>
  <title>Sudoku</title>
  <style>
    body { text-align:center; font-family:Arial; background:#f2f2f2; }
    table { border-collapse: collapse; margin: 20px auto; }
    td { border: 1px solid #555; }
    input {
      width: 35px;
      height: 35px;
      text-align: center;
      font-size: 20px;
    }
    .fixed {
      background: #ddd;
      font-weight: bold;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
    }
  </style>
</head>
<body>

<h1>🧩 Sudoku</h1>
<p>Fill in the missing numbers.</p>

<table id="board"></table>

<button onclick="checkSudoku()">Check</button>
<button onclick="location.reload()">Restart</button>
<p id="message"></p>
<a href="index.html">⬅ Back to Home</a>

<script>
let puzzle = [
  [5,3,"","",7,"","","",""],
  [6,"","",1,9,5,"","",""],
  ["",9,8,"","","","",6,""],
  [8,"","","",6,"","","",3],
  [4,"","",8,"",3,"","",1],
  [7,"","","",2,"","","",6],
  ["",6,"","","","",2,8,""],
  ["","","",4,1,9,"","",5],
  ["","","","",8,"","",7,9]
];

let solution = [
  [5,3,4,6,7,8,9,1,2],
  [6,7,2,1,9,5,3,4,8],
  [1,9,8,3,4,2,5,6,7],
  [8,5,9,7,6,1,4,2,3],
  [4,2,6,8,5,3,7,9,1],
  [7,1,3,9,2,4,8,5,6],
  [9,6,1,5,3,7,2,8,4],
  [2,8,7,4,1,9,6,3,5],
  [3,4,5,2,8,6,1,7,9]
];

function createBoard() {
  let table = document.getElementById("board");

  for (let r = 0; r < 9; r++) {
    let row = document.createElement("tr");

    for (let c = 0; c < 9; c++) {
      let cell = document.createElement("td");
      let input = document.createElement("input");
      input.maxLength = 1;

      if (puzzle[r][c] !== "") {
        input.value = puzzle[r][c];
        input.disabled = true;
        input.className = "fixed";
      }

      cell.appendChild(input);
      row.appendChild(cell);
    }

    table.appendChild(row);
  }
}

function checkSudoku() {
  let inputs = document.querySelectorAll("input");
  let index = 0;

  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      let value = Number(inputs[index].value);
      if (value !== solution[r][c]) {
        document.getElementById("message").innerText = "❌ Something is wrong. Try again!";
        return;
      }
      index++;
    }
  }

  document.getElementById("message").innerText = "🎉 Correct! You solved it!";
}

createBoard();
</script>

</body>
</html>
