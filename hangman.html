<!DOCTYPE html>
<html>
<head>
  <title>Hangman</title>
  <style>
    body { text-align:center; font-family:Arial; background:#f2f2f2; }
    button { margin:5px; padding:10px; font-size:16px; }
  </style>
</head>
<body>

<h1>🪢 Hangman</h1>
<p id="word"></p>
<p id="wrong">Wrong guesses: 0 / 6</p>
<p id="message"></p>
<div id="letters"></div>
<br>
<button onclick="location.reload()">Restart</button>
<br><br>
<a href="index.html">⬅ Back to Home</a>

<script>
let words = ["javascript", "computer", "website", "github", "arcade"];
let secret = words[Math.floor(Math.random() * words.length)];
let guessed = [];
let wrong = 0;

function showWord() {
  let display = "";
  for (let letter of secret) {
    display += guessed.includes(letter) ? letter + " " : "_ ";
  }
  document.getElementById("word").innerText = display;

  if (!display.includes("_")) {
    document.getElementById("message").innerText = "🎉 You won!";
    disableButtons();
  }
}

function guess(letter) {
  guessed.push(letter);

  if (!secret.includes(letter)) {
    wrong++;
    document.getElementById("wrong").innerText = "Wrong guesses: " + wrong + " / 6";
  }

  if (wrong >= 6) {
    document.getElementById("message").innerText = "Game over! Word was: " + secret;
    disableButtons();
  }

  showWord();
}

function createLetters() {
  let alphabet = "abcdefghijklmnopqrstuvwxyz";
  for (let letter of alphabet) {
    let btn = document.createElement("button");
    btn.innerText = letter;
    btn.onclick = function() {
      btn.disabled = true;
      guess(letter);
    };
    document.getElementById("letters").appendChild(btn);
  }
}

function disableButtons() {
  let buttons = document.querySelectorAll("#letters button");
  buttons.forEach(btn => btn.disabled = true);
}

createLetters();
showWord();
</script>

</body>
</html>
