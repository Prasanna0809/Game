<!DOCTYPE html>
<html>
<head>
  <title>Breakout Pro</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #7c3aed);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      width: 95%;
      max-width: 720px;
    }

    h1 {
      margin-top: 0;
      color: #7c3aed;
      cursor: pointer;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .card {
      background: #f3e8ff;
      padding: 15px 20px;
      border-radius: 15px;
      min-width: 110px;
    }

    .card h2 {
      margin: 0;
      color: #7c3aed;
    }

    canvas {
      background: #020617;
      border-radius: 15px;
      width: 100%;
      max-width: 560px;
      cursor: pointer;
    }

    button, a {
      display: inline-block;
      margin: 8px 5px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #7c3aed;
      color: white;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover, a:hover {
      background: #6d28d9;
    }

    #message {
      font-size: 18px;
      font-weight: bold;
      min-height: 28px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 id="gameTitle">🧱 Breakout Pro</h1>
  <p id="startText"><strong>Press Space or click the game to start.</strong></p>
  <p>Use left/right arrow keys or move your mouse.</p>
  <p><strong>Controls:</strong> Space = Start/Pause, R = Restart, Backspace = Home</p>

  <div class="stats">
    <div class="card">
      <h2 id="score">0</h2>
      <p>Score</p>
    </div>
    <div class="card">
      <h2 id="lives">3</h2>
      <p>Lives</p>
    </div>
    <div class="card">
      <h2 id="level">1</h2>
      <p>Level</p>
    </div>
    <div class="card">
      <h2 id="best">0</h2>
      <p>Best</p>
    </div>
  </div>

  <canvas id="game" width="560" height="360"></canvas>

  <div>
    <button onclick="restartGame()">Restart</button>
    <button onclick="togglePause()">Pause / Resume</button>
    <a href="index.html">⬅ Home</a>
  </div>

  <p id="message">Break all the bricks!</p>
</div>

<script src="achievements.js"></script>
<script src="sounds.js"></script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let x, y, dx, dy;
let ballRadius = 9;

let paddleHeight = 12;
let paddleWidth = 95;
let paddleX;

let rightPressed = false;
let leftPressed = false;

let brickRowCount;
let brickColumnCount = 7;
let brickWidth = 65;
let brickHeight = 22;
let brickPadding = 10;
let brickOffsetTop = 35;
let brickOffsetLeft = 25;

let bricks = [];
let score = 0;
let lives = 3;
let level = 1;
let best = Number(localStorage.getItem("breakoutBest")) || 0;

let paused = false;
let gameStarted = false;
let gameOver = false;
let animationId;

document.getElementById("best").innerText = best;

function safeSound(type) {
  if (typeof playSound === "function") {
    playSound(type);
  }
}

function safeAchievement(id) {
  if (typeof unlockAchievement === "function") {
    unlockAchievement(id);
  }
}

document.addEventListener("keydown", keyDownHandler);
document.addEventListener("keyup", keyUpHandler);

canvas.addEventListener("mousemove", function(e) {
  if (!gameStarted || paused || gameOver) return;

  const rect = canvas.getBoundingClientRect();
  paddleX = e.clientX - rect.left - paddleWidth / 2;
  keepPaddleInBounds();
});

canvas.addEventListener("click", function() {
  if (!gameStarted) {
    startGame();
  } else {
    togglePause();
  }
});

document.getElementById("gameTitle").addEventListener("click", function() {
  if (!gameStarted) {
    startGame();
  }
});

function showStartScreen() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#020617";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "bold 42px Arial";
  ctx.textAlign = "center";
  ctx.fillText("▶ START", canvas.width / 2, canvas.height / 2 - 10);

  ctx.font = "18px Arial";
  ctx.fillText("Press Space or click the game", canvas.width / 2, canvas.height / 2 + 30);
}

function startGame() {
  safeAchievement("first_game");
  safeSound("click");

  score = 0;
  lives = 3;
  level = 1;
  gameStarted = true;
  gameOver = false;
  paused = false;
  rightPressed = false;
  leftPressed = false;

  document.getElementById("startText").innerText = "Game started!";
  document.getElementById("message").innerText = "Break all the bricks!";

  setupLevel();
}

function setupLevel() {
  x = canvas.width / 2;
  y = canvas.height - 50;

  dx = 3 + level * 0.45;
  dy = -3 - level * 0.45;

  paddleX = (canvas.width - paddleWidth) / 2;

  brickRowCount = Math.min(3 + level, 7);

  createBricks();
  updateStats();

  cancelAnimationFrame(animationId);
  draw();
}

function createBricks() {
  bricks = [];

  for (let c = 0; c < brickColumnCount; c++) {
    bricks[c] = [];

    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r] = {
        x: 0,
        y: 0,
        status: 1
      };
    }
  }
}

function keyDownHandler(e) {
  if (
    e.key === "ArrowLeft" ||
    e.key === "ArrowRight" ||
    e.key === " " ||
    e.key === "Backspace"
  ) {
    e.preventDefault();
  }

  if (e.key === "Backspace") {
    window.location.href = "index.html";
  }

  if (e.key === "r" || e.key === "R") {
    restartGame();
  }

  if (e.key === " ") {
    if (!gameStarted) {
      startGame();
    } else {
      togglePause();
    }
  }

  if (!gameStarted || paused || gameOver) return;

  if (e.key === "Right" || e.key === "ArrowRight") {
    rightPressed = true;
  }

  if (e.key === "Left" || e.key === "ArrowLeft") {
    leftPressed = true;
  }
}

function keyUpHandler(e) {
  if (e.key === "Right" || e.key === "ArrowRight") {
    rightPressed = false;
  }

  if (e.key === "Left" || e.key === "ArrowLeft") {
    leftPressed = false;
  }
}

function draw() {
  if (!gameStarted || gameOver) return;

  if (paused) {
    drawPauseOverlay();
    animationId = requestAnimationFrame(draw);
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBricks();
  drawBall();
  drawPaddle();
  collisionDetection();

  if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
    dx = -dx;
  }

  if (y + dy < ballRadius) {
    dy = -dy;
  } else if (y + dy > canvas.height - ballRadius) {
    if (x > paddleX && x < paddleX + paddleWidth) {
      safeSound("click");
      dy = -Math.abs(dy);
      dx += (x - (paddleX + paddleWidth / 2)) * 0.04;
    } else {
      lives--;
      safeSound("lose");
      updateStats();

      if (lives <= 0) {
        endGame();
        return;
      } else {
        resetBall();
      }
    }
  }

  if (rightPressed && paddleX < canvas.width - paddleWidth) {
    paddleX += 9;
  }

  if (leftPressed && paddleX > 0) {
    paddleX -= 9;
  }

  keepPaddleInBounds();

  x += dx;
  y += dy;

  animationId = requestAnimationFrame(draw);
}

function drawPauseOverlay() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "bold 34px Arial";
  ctx.textAlign = "center";
  ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);

  ctx.font = "18px Arial";
  ctx.fillText("Press Space or click to resume", canvas.width / 2, canvas.height / 2 + 35);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.closePath();
}

function drawPaddle() {
  ctx.fillStyle = "#a78bfa";
  ctx.fillRect(
    paddleX,
    canvas.height - paddleHeight - 10,
    paddleWidth,
    paddleHeight
  );
}

function drawBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status === 1) {
        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;

        bricks[c][r].x = brickX;
        bricks[c][r].y = brickY;

        ctx.fillStyle = ["#f97316", "#22c55e", "#38bdf8", "#ec4899", "#facc15", "#a78bfa", "#fb7185"][r % 7];
        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
      }
    }
  }
}

function collisionDetection() {
  let remaining = 0;

  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      const b = bricks[c][r];

      if (b.status === 1) {
        remaining++;

        if (
          x > b.x &&
          x < b.x + brickWidth &&
          y > b.y &&
          y < b.y + brickHeight
        ) {
          dy = -dy;
          b.status = 0;
          score += 10 + level;
          safeSound("score");
          updateStats();
        }
      }
    }
  }

  if (remaining === 0) {
    level++;

    if (level >= 3) {
      safeAchievement("breakout_level_3");
    }

    safeSound("win");
    document.getElementById("message").innerText =
      "🚀 Level " + level + "!";

    setupLevel();
  }
}

function resetBall() {
  x = canvas.width / 2;
  y = canvas.height - 50;
  dx = 3 + level * 0.45;
  dy = -3 - level * 0.45;
  paddleX = (canvas.width - paddleWidth) / 2;
}

function endGame() {
  gameOver = true;
  gameStarted = false;
  cancelAnimationFrame(animationId);

  if (score > best) {
    best = score;
    localStorage.setItem("breakoutBest", best);
    safeSound("win");
    document.getElementById("message").innerText =
      "🏆 New best score: " + score + "!";
  } else {
    safeSound("lose");
    document.getElementById("message").innerText =
      "Game over! Score: " + score;
  }

  updateStats();

  setTimeout(() => {
    document.getElementById("startText").innerText =
      "Press Space or click the game to start again.";
    showStartScreen();
  }, 700);
}

function restartGame() {
  startGame();
}

function togglePause() {
  if (!gameStarted) {
    startGame();
    return;
  }

  if (gameOver) return;

  paused = !paused;
  safeSound("click");
}

function keepPaddleInBounds() {
  if (paddleX < 0) {
    paddleX = 0;
  }

  if (paddleX + paddleWidth > canvas.width) {
    paddleX = canvas.width - paddleWidth;
  }
}

function updateStats() {
  document.getElementById("score").innerText = score;
  document.getElementById("lives").innerText = lives;
  document.getElementById("level").innerText = level;
  document.getElementById("best").innerText = best;
}

showStartScreen();
</script>

</body>
</html>
