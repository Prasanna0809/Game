<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors Pro</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      background: white;
      padding: 35px;
      border-radius: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      width: 90%;
      max-width: 620px;
    }

    h1 {
      margin-top: 0;
      color: #7c3aed;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 25px 0;
    }

    .card {
      background: #faf5ff;
      padding: 15px 20px;
      border-radius: 15px;
      min-width: 120px;
    }

    .card h2 {
      margin: 0;
      color: #7c3aed;
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin: 25px 0;
    }

    .choice-btn {
      border: none;
      border-radius: 18px;
      padding: 20px 24px;
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: white;
      cursor: pointer;
      min-width: 150px;
      transition: transform 0.15s ease;
    }

    .choice-btn:hover {
      transform: scale(1.05);
    }

    .choice-btn:active {
      transform: scale(0.95);
    }

    .battle {
      background: #f9fafb;
      padding: 20px;
      border-radius: 18px;
      margin-top: 20px;
      font-size: 20px;
      line-height: 1.8;
      min-height: 140px;
    }

    .result {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }

    button, a {
      display: inline-block;
      margin: 10px 5px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #7c3aed;
      color: white;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover, a:hover {
      background: #6d28d9;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>✊ ✋ ✌️ Rock Paper Scissors Pro</h1>
  <p>Play against the computer and build your win streak!</p>

  <div class="stats">
    <div class="card">
      <h2 id="wins">0</h2>
      <p>Wins</p>
    </div>
    <div class="card">
      <h2 id="losses">0</h2>
      <p>Losses</p>
    </div>
    <div class="card">
      <h2 id="ties">0</h2>
      <p>Ties</p>
    </div>
    <div class="card">
      <h2 id="bestStreak">0</h2>
      <p>Best Streak</p>
    </div>
  </div>

  <div class="choices">
    <button class="choice-btn" onclick="play('rock', '🪨')">🪨 Rock</button>
    <button class="choice-btn" onclick="play('paper', '📄')">📄 Paper</button>
    <button class="choice-btn" onclick="play('scissors', '✂️')">✂️ Scissors</button>
  </div>

  <div class="battle">
    <div id="playerChoice">You: ?</div>
    <div id="computerChoice">Computer: ?</div>
    <div id="result" class="result">Make your move!</div>
  </div>

  <div>
    <button onclick="resetStats()">Reset Stats</button>
    <a href="index.html">⬅ Home</a>
  </div>
</div>

<script>
let wins = Number(localStorage.getItem("rpsWins")) || 0;
let losses = Number(localStorage.getItem("rpsLosses")) || 0;
let ties = Number(localStorage.getItem("rpsTies")) || 0;
let currentStreak = Number(localStorage.getItem("rpsCurrentStreak")) || 0;
let bestStreak = Number(localStorage.getItem("rpsBestStreak")) || 0;

const emojis = {
  rock: "🪨",
  paper: "📄",
  scissors: "✂️"
};

updateStats();

function play(playerChoice) {
  const choices = ["rock", "paper", "scissors"];
  const computerChoice =
    choices[Math.floor(Math.random() * choices.length)];

  document.getElementById("playerChoice").innerText =
    "You: " + emojis[playerChoice] + " " + capitalize(playerChoice);

  document.getElementById("computerChoice").innerText =
    "Computer: " + emojis[computerChoice] + " " + capitalize(computerChoice);

  let resultText = "";

  if (playerChoice === computerChoice) {
    ties++;
    resultText = "🤝 It's a Tie!";
  } else if (
    (playerChoice === "rock" && computerChoice === "scissors") ||
    (playerChoice === "paper" && computerChoice === "rock") ||
    (playerChoice === "scissors" && computerChoice === "paper")
  ) {
    wins++;
    currentStreak++;
    resultText = "🎉 You Win!";

    if (currentStreak > bestStreak) {
      bestStreak = currentStreak;
    }
  } else {
    losses++;
    currentStreak = 0;
    resultText = "💻 Computer Wins!";
  }

  document.getElementById("result").innerText = resultText;

  saveStats();
  updateStats();
}

function updateStats() {
  document.getElementById("wins").innerText = wins;
  document.getElementById("losses").innerText = losses;
  document.getElementById("ties").innerText = ties;
  document.getElementById("bestStreak").innerText = bestStreak;
}

function saveStats() {
  localStorage.setItem("rpsWins", wins);
  localStorage.setItem("rpsLosses", losses);
  localStorage.setItem("rpsTies", ties);
  localStorage.setItem("rpsCurrentStreak", currentStreak);
  localStorage.setItem("rpsBestStreak", bestStreak);
}

function resetStats() {
  wins = 0;
  losses = 0;
  ties = 0;
  currentStreak = 0;
  bestStreak = 0;

  saveStats();
  updateStats();

  document.getElementById("playerChoice").innerText = "You: ?";
  document.getElementById("computerChoice").innerText = "Computer: ?";
  document.getElementById("result").innerText = "Make your move!";
}

function capitalize(word) {
  return word.charAt(0).toUpperCase() + word.slice(1);
}
</script>

</body>
</html>
