<!DOCTYPE html>
<html>
<head>
  <title>Reaction Game</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h1>⚡ Reaction Game</h1>
<p>Click start. When the button turns green, click it fast!</p>

<button id="btn" onclick="startGame()" style="padding:20px; font-size:20px;">
  Start
</button>

<p id="result"></p>
<a href="index.html">⬅ Back to Home</a>

<script>
let startTime;
let ready = false;

function startGame() {
  let btn = document.getElementById("btn");
  let result = document.getElementById("result");

  if (ready) {
    let reactionTime = Date.now() - startTime;
    result.innerText = "⏱ Your reaction time: " + reactionTime + " ms";
    btn.innerText = "Start Again";
    btn.style.background = "";
    ready = false;
    return;
  }

  result.innerText = "Wait for green...";
  btn.innerText = "Wait...";
  btn.style.background = "red";

  let delay = Math.floor(Math.random() * 3000) + 1000;

  setTimeout(function() {
    btn.style.background = "green";
    btn.innerText = "CLICK!";
    startTime = Date.now();
    ready = true;
  }, delay);
}
</script>

</body>
</html>
